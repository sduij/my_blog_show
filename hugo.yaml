baseurl: https://glowingsky.netlify.app/
languageCode: zh-cn
theme: hugo-theme-stack
title: glowingsky
copyright: glowingsky

DefaultContentLanguage: zh-cn
hasCJKLanguage: true

languages:
    en:
        languageName: English
        title: glowingsky
        weight: 1
        params:
            description: Code, notes, and the fragments worth keeping.
            sidebar:
                subtitle: Code, notes, and the fragments worth keeping.
            footer:
                customText: Write slowly. Keep the good fragments.
    zh-cn:
        languageName: 中文
        title: glowingsky
        weight: 2
        params:
            description: 写代码、搭博客，也记录那些值得留下来的片段。
            sidebar:
                subtitle: 为了拯救世界，我决定成为...
            footer:
                customText: 慢一点写，也写成自己的样子。

services:
    googleAnalytics:
        id:

pagination:
    pagerSize: 5

permalinks:
    post: /p/:slug/
    page: /:slug/

params:
    description: 写代码、搭博客，也记录那些值得留下来的片段。
    mainSections:
        - post
    featuredImageField: image
    rssFullContent: true
    favicon: /favicon2.ico

    footer:
        since: 2026
        customText: 慢一点写，也写成自己的样子。

    dateFormat:
        published: 2006-01-02
        lastUpdated: 2006-01-02 15:04

    sidebar:
        compact: false
        subtitle: 为了拯救世界，我决定成为...
        avatar:
            enabled: true
            local: false
            src: /img/momo-avatar.png

    article:
        headingAnchor: false
        math: false
        toc: true
        readingTime: true
        license:
            enabled: false
            default: Licensed under CC BY-NC-SA 4.0

    comments:
        enabled: false
        provider: disqus

    widgets:
        homepage:
            - type: search
            - type: categories
              params:
                  limit: 6
            - type: tag-cloud
              params:
                  limit: 12
        page:
            - type: toc

    opengraph:
        twitter:
            site:
            card: summary_large_image

    defaultImage:
        opengraph:
            enabled: false
            local: false
            src:

    colorScheme:
        toggle: true
        default: light

    imageProcessing:
        cover:
            enabled: true
        content:
            enabled: true

menu:
    main: []
    social:
        - identifier: github
          name: GitHub
          url: https://github.com/sduij
          params:
              icon: brand-github
        - identifier: rss
          name: RSS
          url: /index.xml
          params:
              icon: rss

related:
    includeNewer: true
    threshold: 60
    toLower: false
    indices:
        - name: tags
          weight: 100
        - name: categories
          weight: 200

markup:
    goldmark:
        extensions:
            passthrough:
                enable: true
                delimiters:
                    block:
                        - - \[
                          - \]
                        - - $$
                          - $$
                    inline:
                        - - \(
                          - \)
        renderer:
            unsafe: true
    tableOfContents:
        endLevel: 4
        ordered: true
        startLevel: 2
    highlight:
        noClasses: false
        codeFences: true
        guessSyntax: true
        lineNoStart: 1
        lineNos: true
        lineNumbersInTable: true
        tabWidth: 4
